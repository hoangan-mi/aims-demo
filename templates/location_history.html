<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Lịch sử cập nhật vị trí</title>

<style>

body{
    font-family:Segoe UI;
    background:#f1f5f9;
    padding:40px;
}

table{
    width:100%;
    border-collapse:collapse;
    background:white;
}

th,td{
    padding:12px;
    border-bottom:1px solid #ddd;
    text-align:center;
}

th{
    background:#2563eb;
    color:white;
}

</style>
</head>

<body>

<h2>Lịch sử cập nhật vị trí tài sản</h2>

<table>

<tr>
<th>Asset ID</th>
<th>Phòng cũ</th>
<th>Phòng mới</th>
<th>Thời gian</th>
</tr>

{% for row in history %}

<tr>
<td>{{ row.asset_id }}</td>
<td>{{ row.old_room }}</td>
<td>{{ row.new_room }}</td>
<td>{{ row.time }}</td>
</tr>

{% endfor %}

</table>

</body>
</html>

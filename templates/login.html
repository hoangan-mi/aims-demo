<!DOCTYPE html>
<html>
<head>

<title>AIMS Login</title>

<style>

body{
    font-family: Arial;
    background:#f4f6f9;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.login-box{
    background:white;
    padding:40px;
    border-radius:10px;
    box-shadow:0 5px 20px rgba(0,0,0,0.15);
    width:320px;
}

h2{
    text-align:center;
    margin-bottom:20px;
}

input{
    width:100%;
    padding:10px;
    margin:10px 0;
}

button{
    width:100%;
    padding:10px;
    background:#2d6cdf;
    border:none;
    color:white;
    font-weight:bold;
    border-radius:5px;
}

button:hover{
    background:#1e4fb3;
}

</style>

</head>

<body>

<div class="login-box">

<h2>Đăng nhập AIMS</h2>

<form method="POST">

<input name="username" placeholder="Username">

<input name="password" type="password" placeholder="Password">

<button type="submit">Login</button>

</form>

</div>

</body>
</html>

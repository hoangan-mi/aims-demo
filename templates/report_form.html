<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Báo cáo hư hỏng</title>
    <style>
        body{
            font-family:Segoe UI;
            background:#eef2f7;
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
        }
        .card{
            background:white;
            padding:30px;
            border-radius:15px;
            width:450px;
            box-shadow:0 8px 25px rgba(0,0,0,0.1);
        }
        textarea{
            width:100%;
            padding:10px;
            border-radius:8px;
            border:1px solid #ccc;
            margin-top:10px;
        }
        button{
            margin-top:15px;
            width:100%;
            padding:12px;
            border:none;
            border-radius:10px;
            background:#2563eb;
            color:white;
            font-weight:600;
            cursor:pointer;
        }
    </style>
</head>
<body>

<div class="card">

<h3>🚨 Báo cáo hư hỏng</h3>

<p><b>ID:</b> {{ asset["ID_assets"] }}</p>
<p><b>Loại:</b> {{ asset["Type_asset"] }}</p>
<p><b>Tòa:</b> {{ asset["Auditorium"] }}</p>
<p><b>Tầng:</b> {{ asset["Floor"] }}</p>
<p><b>Phòng:</b> {{ asset["Room"] }}</p>

<form method="post">
    <label>Mô tả tình trạng:</label>
    <textarea name="description" rows="4" required></textarea>
    <button type="submit">Gửi báo cáo</button>
</form>

</div>

</body>
</html>

<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Quét QR tài sản</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<script src="https://unpkg.com/html5-qrcode"></script>

<style>
body {
    margin: 0;
    background: black;
    color: white;
    font-family: Arial, sans-serif;
    text-align: center;
}

#reader {
    width: 100%;
    height: 100vh;
}

.overlay {
    position: absolute;
    top: 50%;
    left: 50%;
    width: 250px;
    height: 250px;
    transform: translate(-50%, -50%);
    border: 4px solid #00ff88;
    border-radius: 15px;
    box-shadow: 0 0 20px #00ff88;
}
</style>
</head>

<body>

<div id="reader"></div>
<div class="overlay"></div>

<script>
function onScanSuccess(decodedText) {
    // Khi quét được QR → chuyển đến trang asset
    window.location.href = "/asset/" + decodedText;
}

let html5QrCode = new Html5Qrcode("reader");

Html5Qrcode.getCameras().then(devices => {
    if (devices && devices.length) {
        html5QrCode.start(
            devices[0].id,
            {
                fps: 10,
                qrbox: 250
            },
            onScanSuccess
        );
    }
}).catch(err => {
    console.log(err);
});
</script>

</body>
</html>

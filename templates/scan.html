<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Asset Scan Result</title>

<script src="https://unpkg.com/html5-qrcode@2.3.8"></script>

<style>
body{
margin:0;
font-family:Segoe UI;
background:#f3f4f6;
display:flex;
justify-content:center;
}

.app{
width:420px;
background:white;
min-height:100vh;
padding:10px 15px 30px 15px;
}

.header{
display:flex;
align-items:center;
gap:10px;
font-weight:600;
margin-bottom:10px;
}

.header span{
font-size:18px;
cursor:pointer;
}

#reader{
width:100%;
height:260px;
border-radius:14px;
overflow:hidden;
margin-bottom:10px;
}

.success{
background:#e8f7ef;
color:#0f9d58;
padding:10px;
border-radius:10px;
font-weight:600;
display:none;
margin-bottom:10px;
}

.card{
background:white;
border-radius:14px;
padding:15px;
box-shadow:0 6px 20px rgba(0,0,0,0.08);
display:none;
}

.asset-title{
font-size:18px;
font-weight:700;
margin-bottom:10px;
}

.asset-id{
color:#666;
font-size:13px;
margin-bottom:10px;
}

.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
font-size:14px;
margin-bottom:15px;
}

.buttons{
display:flex;
gap:10px;
}

.btn{
flex:1;
padding:10px;
border:none;
border-radius:8px;
color:white;
font-weight:600;
cursor:pointer;
}

.btn-red{ background:#ef4444; }
.btn-green{ background:#22c55e; }

.footer{
text-align:center;
font-size:12px;
color:#777;
margin-top:10px;
}
</style>
</head>

<body>

<div class="app">

<div class="header">
<span onclick="history.back()">←</span>
<span>Asset Scan</span>
</div>

<div id="reader"></div>

<div class="success" id="success">
✔ Scan Successful
</div>

<div class="card" id="assetCard">

<div class="asset-title" id="assetName"></div>
<div class="asset-id" id="assetID"></div>

<div class="grid">
<div><b>Tòa</b><br><span id="assetAud"></span></div>
<div><b>Tầng</b><br><span id="assetFloor"></span></div>
<div><b>Phòng</b><br><span id="assetRoom"></span></div>
<div><b>Loại</b><br><span id="assetType"></span></div>
</div>

<div class="buttons">
<a id="reportBtn" class="btn btn-red">⚠ Báo hỏng</a>
<a id="updateBtn" class="btn btn-green">📍 Cập nhật</a>
</div>

</div>

<div class="footer">
Scan liên tục – không chuyển trang
</div>

</div>

<script>

const html5QrCode = new Html5Qrcode("reader")

let lastScanned = ""
let lastScanTime = 0

function cleanID(text){
let id = text.trim()

if(id.includes("/asset/")){
id = id.split("/asset/")[1]
}

return id.replace(/\r?\n|\r/g,"")
}

function onScanSuccess(decodedText){

let now = Date.now()
let id = cleanID(decodedText)

/* chống quét trùng */
if(id === lastScanned && now - lastScanTime < 1500){
return
}

lastScanned = id
lastScanTime = now

fetch("/api/asset/"+encodeURIComponent(id))
.then(res=>res.json())
.then(data=>{

if(data.status==="ok"){

let a = data.data

document.getElementById("success").style.display="block"
document.getElementById("assetCard").style.display="block"

document.getElementById("assetName").innerText = a.Type_asset
document.getElementById("assetID").innerText = a.ID_assets
document.getElementById("assetAud").innerText = a.Auditorium
document.getElementById("assetFloor").innerText = a.Floor
document.getElementById("assetRoom").innerText = a.Room
document.getElementById("assetType").innerText = a.Type_asset

document.getElementById("reportBtn").onclick = function(){
location = "/report/" + a.ID_assets
}

document.getElementById("updateBtn").href = "/update-location/" + a.ID_assets

navigator.vibrate(200)

}

})

}

function startScanner(){

Html5Qrcode.getCameras().then(cameras=>{

if(!cameras || cameras.length === 0){
alert("❌ Không tìm thấy camera")
return
}

/* Ưu tiên camera sau */
let cameraId = cameras.find(c=>c.label.toLowerCase().includes("back"))?.id 
               || cameras[cameras.length-1].id

html5QrCode.start(
cameraId,
{
fps:10,
qrbox:{width:250,height:250},
aspectRatio:1.0
},
onScanSuccess
)

}).catch(err=>{
alert("❌ Lỗi camera: " + err)
})

}

window.onload = function(){

/* QUAN TRỌNG: phải chạy HTTPS hoặc localhost */
if(location.protocol !== "https:" && location.hostname !== "localhost"){
alert("⚠ Mở bằng localhost hoặc HTTPS mới dùng được camera")
}

startScanner()

}

</script>

</body>
</html>

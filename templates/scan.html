<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Asset Scan</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<script src="https://unpkg.com/html5-qrcode@2.3.8"></script>

<style>

body{
margin:0;
font-family:Arial;
background:#f4f4f4;
}

#reader{
width:100%;
height:260px;
}

.container{
padding:15px;
}

.card{
background:white;
padding:20px;
border-radius:15px;
box-shadow:0 5px 20px rgba(0,0,0,0.1);
margin-top:15px;
}

.success{
background:#e8f5e9;
color:#2e7d32;
padding:12px;
border-radius:10px;
margin-bottom:15px;
font-weight:600;
}

.row{
display:flex;
justify-content:space-between;
margin-bottom:10px;
}

.btn{
padding:12px;
border:none;
border-radius:10px;
color:white;
font-weight:600;
cursor:pointer;
width:48%;
}

.red{
background:#ef4444;
}

.green{
background:#22c55e;
}

.upload{
margin-top:10px;
text-align:center;
}

</style>
</head>

<body>

<div id="reader"></div>

<div class="upload">
<input type="file" id="fileInput" accept="image/*">
</div>

<div class="container">

<div id="result" style="display:none">

<div class="card">

<div class="success">
✔ Scan Successful
</div>

<h2 id="type"></h2>
<p id="assetId"></p>

<div class="row">
<div>
<b>Tòa</b><br>
<span id="building"></span>
</div>

<div>
<b>Tầng</b><br>
<span id="floor"></span>
</div>
</div>

<div class="row">
<div>
<b>Phòng</b><br>
<span id="room"></span>
</div>

<div>
<b>Loại</b><br>
<span id="type2"></span>
</div>
</div>

<div class="row" style="margin-top:15px">

<button class="btn red">
⚠ Báo hỏng
</button>

<button class="btn green">
📍 Cập nhật vị trí
</button>

</div>

</div>

</div>

</div>

<script>

const qr = new Html5Qrcode("reader");

function cleanID(text){

let id=text.trim();

if(id.includes("/asset/")){
id=id.split("/asset/")[1];
}

return id;

}

function loadAsset(id){

fetch("/api/asset/"+id)

.then(r=>r.json())

.then(data=>{

if(!data.success){
alert("Không tìm thấy tài sản")
return
}

let a=data.asset

document.getElementById("result").style.display="block"

document.getElementById("type").innerText=a.Type_asset
document.getElementById("type2").innerText=a.Type_asset
document.getElementById("assetId").innerText=a.ID_assets

document.getElementById("building").innerText=a.Auditorium
document.getElementById("floor").innerText=a.Floor
document.getElementById("room").innerText=a.Room

})

}

function onScanSuccess(text){

let id=cleanID(text)

loadAsset(id)

}

qr.start(
{ facingMode:"environment" },
{
fps:20,
qrbox:250
},
onScanSuccess
)


// scan ảnh
document.getElementById("fileInput").addEventListener("change",function(){

let file=this.files[0]

qr.scanFile(file,true)

.then(text=>{

let id=cleanID(text)

loadAsset(id)

})

.catch(()=>{
alert("Không đọc được QR")
})

})

</script>

</body>
</html>

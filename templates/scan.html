```html
<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Asset Scan</title>

<script src="https://unpkg.com/html5-qrcode@2.3.8"></script>

<style>

body{
margin:0;
font-family:Arial;
background:#f4f4f4;
display:flex;
justify-content:center;
}

.app{
width:420px;
background:white;
min-height:100vh;
padding:12px;
}

.header{
display:flex;
align-items:center;
gap:10px;
font-size:20px;
font-weight:600;
margin-bottom:10px;
}

#reader{
width:100%;
height:260px;
background:black;
border-radius:20px;
overflow:hidden;
position:relative;
}

/* CAMERA VIDEO */

#reader video{
width:100% !important;
height:100% !important;
object-fit:cover;
}

/* OVERLAY (không chặn scan) */

.overlay{
position:absolute;
top:0;
left:0;
right:0;
bottom:0;
pointer-events:none;
}

/* SCAN CORNERS */

.corner{
position:absolute;
width:50px;
height:50px;
border:5px solid white;
}

.tl{top:30px;left:30px;border-right:none;border-bottom:none;}
.tr{top:30px;right:30px;border-left:none;border-bottom:none;}
.bl{bottom:30px;left:30px;border-right:none;border-top:none;}
.br{bottom:30px;right:30px;border-left:none;border-top:none;}

/* SCAN LINE */

.scan-line{
position:absolute;
width:100%;
height:3px;
background:linear-gradient(90deg,transparent,#00ff9c,transparent);
animation:scan 1.5s linear infinite;
}

@keyframes scan{
0%{top:30px;}
100%{top:220px;}
}

</style>
</head>

<body>

<div class="app">

<div class="header">
<div onclick="history.back()">←</div>
<div>Asset Scan</div>
</div>

<div id="reader">

<div class="overlay">

<div class="scan-line"></div>

<div class="corner tl"></div>
<div class="corner tr"></div>
<div class="corner bl"></div>
<div class="corner br"></div>

</div>

</div>

</div>

<script>

const scanner = new Html5Qrcode("reader")

function onScanSuccess(decodedText){
console.log("QR:", decodedText)
alert(decodedText)
}

function startScanner(){

Html5Qrcode.getCameras().then(cameras => {

if(!cameras.length){
alert("No camera")
return
}

const cameraId = cameras[cameras.length-1].id

scanner.start(
cameraId,
{
fps:10,
qrbox:220,
aspectRatio:1
},
onScanSuccess
)

})

}

window.onload = startScanner

</script>

</body>
</html>
```

<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Quét QR tài sản</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<script src="https://unpkg.com/html5-qrcode@2.3.8"></script>

<style>
body{
    margin:0;
    background:black;
    font-family:Arial;
}

#reader{
    width:100%;
    height:100vh;
}

.topbar{
    position:absolute;
    top:20px;
    left:50%;
    transform:translateX(-50%);
}

button{
    padding:10px 20px;
    border:none;
    border-radius:8px;
    font-size:14px;
    cursor:pointer;
}

.status{
    position:absolute;
    bottom:30px;
    left:50%;
    transform:translateX(-50%);
    color:white;
}
</style>
</head>

<body>

<div id="reader"></div>

<div class="topbar">
<input type="file" id="imageUpload" accept="image/*">
</div>

<div class="status" id="status">Đang mở camera...</div>

<script>

const html5QrCode = new Html5Qrcode("reader");
let scanned=false;

function cleanID(text){
    let id=text.trim();

    if(id.includes("/asset/")){
        id=id.split("/asset/")[1];
    }

    return id.replace(/\r?\n|\r/g,"");
}

function goToAsset(id){

    document.getElementById("status").innerText="Đang mở tài sản "+id;

    window.location.href="/asset/"+encodeURIComponent(id);

}

function onScanSuccess(decodedText){

    if(scanned) return;

    scanned=true;

    let id=cleanID(decodedText);

    html5QrCode.stop().then(()=>{

        goToAsset(id)

    });

}

function onScanFailure(error){}


// mở camera
function startScanner(){

Html5Qrcode.getCameras().then(devices=>{

let cameraId=devices[devices.length-1].id

html5QrCode.start(
cameraId,
{
fps:20,
qrbox:280
},
onScanSuccess,
onScanFailure
)

})

}

window.onload=startScanner



// quét QR từ ảnh
document.getElementById("imageUpload").addEventListener("change",function(){

const file=this.files[0]

if(!file) return

html5QrCode.scanFile(file,true)
.then(decodedText=>{

let id=cleanID(decodedText)

goToAsset(id)

})
.catch(err=>{

alert("Không tìm thấy QR trong ảnh")

})

})

</script>

</body>
</html>

<!DOCTYPE html>
<html lang="vi">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Asset Scan</title>

<script src="https://unpkg.com/html5-qrcode@2.3.8"></script>

<style>

body{
margin:0;
font-family:Segoe UI;
background:#f3f4f6;
display:flex;
justify-content:center;
}

.app{
width:420px;
background:white;
min-height:100vh;
}

.header{
display:flex;
align-items:center;
padding:15px;
font-weight:600;
border-bottom:1px solid #eee;
}

.back{
font-size:22px;
margin-right:10px;
cursor:pointer;
}

.scan-box{
padding:15px;
}

#reader{
width:100%;
height:45vh;
border-radius:15px;
overflow:hidden;
position:relative;
}

/* video */

#reader video{
object-fit:cover;
}

/* scan text */

.scan-text{
text-align:center;
color:#666;
font-size:14px;
margin-top:10px;
}

/* RESULT CARD */

.card{
display:none;
margin:15px;
padding:15px;
background:white;
border-radius:12px;
box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
margin-top:10px;
}

button{
padding:10px;
border:none;
border-radius:8px;
color:white;
font-weight:600;
cursor:pointer;
}

.btn-red{
background:#ef4444;
margin-top:10px;
width:100%;
}

</style>

</head>

<body>

<div class="app">

<div class="header">
<span class="back" onclick="history.back()">←</span>
Asset Scan
</div>

<div class="scan-box">

<div id="reader"></div>

<div class="scan-text">
Scan QR để xem thông tin tài sản
</div>

</div>


<div class="card" id="assetCard">

<h3 id="assetName"></h3>

<p>ID: <span id="assetID"></span></p>

<div class="grid">

<div>
<b>Auditorium</b><br>
<span id="assetBuilding"></span>
</div>

<div>
<b>Floor</b><br>
<span id="assetFloor"></span>
</div>

<div>
<b>Room</b><br>
<span id="assetRoom"></span>
</div>

<div>
<b>Type</b><br>
<span id="assetType"></span>
</div>

</div>

<a id="reportLink">
<button class="btn-red">⚠ Báo hỏng</button>
</a>

<a id="updateLink">
<button style="background:#22c55e;margin-top:10px;width:100%;">
📍 Cập nhật vị trí
</button>
</a>
</a>

</div>

</div>


<script>

const html5QrCode = new Html5Qrcode("reader")

let lastScan=""
let lastTime=0


function cleanID(text){

let id=text.trim()

if(id.includes("/asset/")){
id=id.split("/asset/")[1]
}

return id.replace(/\r?\n|\r/g,"")

}


function onScanSuccess(decodedText){

let now=Date.now()

let id=cleanID(decodedText)

/* chống scan trùng */

if(id===lastScan && now-lastTime<500) return

lastScan=id
lastTime=now


fetch("/api/asset/"+encodeURIComponent(id))

.then(res=>res.json())

.then(data=>{

if(data.status==="ok"){

let a=data.data

document.getElementById("assetCard").style.display="block"

document.getElementById("assetName").innerText=a.Type_asset || "-"
document.getElementById("assetID").innerText=a.ID_assets || "-"
document.getElementById("assetBuilding").innerText=a.Auditorium || "-"
document.getElementById("assetFloor").innerText=a.Floor || "-"
document.getElementById("assetRoom").innerText=a.Room || "-"
document.getElementById("assetType").innerText=a.Type_asset || "-"

document.getElementById("reportLink").href="/report/"+a.ID_assets
document.getElementById("updateLink").href="/update-location/"+a.ID_assets

navigator.vibrate(80)

}

})

.catch(()=>{})

}



function startScanner(){

Html5Qrcode.getCameras().then(devices=>{

if(!devices.length){
alert("Không tìm thấy camera")
return
}

/* camera sau */

let cameraId=devices[devices.length-1].id


html5QrCode.start(

cameraId,

{
fps:10,

qrbox:function(viewfinderWidth,viewfinderHeight){

let width=viewfinderWidth*0.85
let height=viewfinderHeight*0.22

return{
width:width,
height:height
}

}

},

onScanSuccess

)

})

}


window.onload=startScanner

</script>

</body>
</html>

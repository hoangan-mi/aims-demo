<!DOCTYPE html>
<html lang="vi">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Asset Scan Result</title>

<script src="https://unpkg.com/html5-qrcode@2.3.8"></script>

<style>

body{
margin:0;
font-family:Segoe UI;
background:#f4f4f4;
display:flex;
justify-content:center;
}

.app{
width:420px;
min-height:100vh;
background:white;
padding:10px 16px 40px 16px;
}

.header{
display:flex;
align-items:center;
gap:10px;
font-size:20px;
font-weight:600;
margin-bottom:10px;
}

.back{
cursor:pointer;
font-size:20px;
}

/* SCANNER */

#reader{
width:100%;
height:240px;
background:black;
border-radius:20px;
overflow:hidden;
position:relative;
}

/* FIX CAMERA RATIO */

#reader video{
width:100% !important;
height:100% !important;
object-fit:cover;
}

/* SCAN CORNERS */

.corner{
position:absolute;
width:40px;
height:40px;
border:5px solid white;
}

.tl{
top:20px;
left:20px;
border-right:none;
border-bottom:none;
}

.tr{
top:20px;
right:20px;
border-left:none;
border-bottom:none;
}

.bl{
bottom:20px;
left:20px;
border-right:none;
border-top:none;
}

.br{
bottom:20px;
right:20px;
border-left:none;
border-top:none;
}

/* SCAN LINE */

.scan-line{
position:absolute;
width:100%;
height:3px;
background:linear-gradient(90deg,transparent,#00ff9c,transparent);
animation:scanMove 2s linear infinite;
}

@keyframes scanMove{
0%{top:20px;}
100%{top:210px;}
}

/* SUCCESS */

.success{
display:none;
background:#e8f7ef;
color:#16a34a;
padding:10px;
border-radius:10px;
font-weight:600;
margin-top:12px;
}

/* CARD */

.card{
display:none;
margin-top:10px;
background:white;
border-radius:14px;
padding:15px;
box-shadow:0 5px 18px rgba(0,0,0,0.08);
}

.asset-title{
font-size:18px;
font-weight:700;
margin-bottom:8px;
}

.asset-id{
color:#777;
font-size:13px;
margin-bottom:12px;
}

.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
font-size:14px;
margin-bottom:14px;
}

.buttons{
display:flex;
gap:10px;
}

.btn{
flex:1;
border:none;
padding:10px;
border-radius:8px;
color:white;
font-weight:600;
cursor:pointer;
}

.btn-red{
background:#ef4444;
}

.btn-green{
background:#22c55e;
}

.footer{
text-align:center;
color:#777;
font-size:13px;
margin-top:10px;
}

</style>
</head>


<body>

<div class="app">

<div class="header">
<div class="back" onclick="history.back()">←</div>
<div>Asset Scan Result</div>
</div>

<div id="reader">

<div class="scan-line"></div>

<div class="corner tl"></div>
<div class="corner tr"></div>
<div class="corner bl"></div>
<div class="corner br"></div>

</div>

<div class="footer">
Scan another QR code to continue.
</div>

<div class="success" id="success">
✔ Scan Successful
</div>

<div class="card" id="assetCard">

<div class="asset-title" id="assetName"></div>

<div class="asset-id" id="assetID"></div>

<div class="grid">

<div>
<b>Tòa</b><br>
<span id="assetAud"></span>
</div>

<div>
<b>Tầng</b><br>
<span id="assetFloor"></span>
</div>

<div>
<b>Phòng</b><br>
<span id="assetRoom"></span>
</div>

<div>
<b>Loại</b><br>
<span id="assetType"></span>
</div>

</div>

<div class="buttons">

<button class="btn btn-red">
⚠ Báo hỏng
</button>

<button class="btn btn-green">
📍 Cập nhật vị trí
</button>

</div>

</div>

</div>


<script>

const html5QrCode = new Html5Qrcode("reader")

let lastScan=null
let lastTime=0

function cleanID(text){

let id=text.trim()

if(id.includes("/asset/")){
id=id.split("/asset/")[1]
}

return id.replace(/\n|\r/g,"")

}

function onScanSuccess(decodedText){

let now=Date.now()
let id=cleanID(decodedText)

if(id===lastScan && now-lastTime<2000) return

lastScan=id
lastTime=now

fetch("/api/asset/"+encodeURIComponent(id))
.then(res=>res.json())
.then(data=>{

if(data.status==="ok"){

let a=data.data

document.getElementById("success").style.display="block"
document.getElementById("assetCard").style.display="block"

document.getElementById("assetName").innerText=a.Type_asset
document.getElementById("assetID").innerText=a.ID_assets
document.getElementById("assetAud").innerText=a.Auditorium
document.getElementById("assetFloor").innerText=a.Floor
document.getElementById("assetRoom").innerText=a.Room
document.getElementById("assetType").innerText=a.Type_asset

navigator.vibrate(200)

}

})

}

function startScanner(){

Html5Qrcode.getCameras().then(devices=>{

let cameraId=devices[devices.length-1].id

html5QrCode.start(
cameraId,
{
fps:12,
qrbox:{width:220,height:220}
},
onScanSuccess
)

})

}

window.onload=startScanner

</script>

</body>
</html>

<html></html>
<!DOCTYPE html>
<html lang="vi">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Asset Scan</title>

<script src="https://unpkg.com/html5-qrcode@2.3.8"></script>

<style>

body{
margin:0;
font-family:Segoe UI;
background:#f3f4f6;
display:flex;
justify-content:center;
}

.app{
width:420px;
background:white;
min-height:100vh;
}

/* HEADER */

.header{
display:flex;
align-items:center;
padding:15px;
font-weight:600;
border-bottom:1px solid #eee;
}

.back{
font-size:22px;
margin-right:10px;
cursor:pointer;
}

/* SCANNER */

.scan-box{
padding:15px;
}

#reader{
width:100%;
border-radius:15px;
overflow:hidden;
}

/* TEXT */

.scan-text{
text-align:center;
color:#666;
font-size:14px;
margin-top:10px;
}

/* RESULT CARD */

.card{
display:none;
margin:15px;
padding:15px;
background:white;
border-radius:12px;
box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
margin-top:10px;
}

button{
padding:10px;
border:none;
border-radius:8px;
color:white;
font-weight:600;
cursor:pointer;
}

.btn-red{
background:#ef4444;
margin-top:10px;
width:100%;
}

.btn-green{
background:#22c55e;
margin-top:10px;
width:100%;
}

input{
width:100%;
padding:8px;
margin-top:5px;
border-radius:6px;
border:1px solid #ccc;
}

</style>

</head>

<body>

<div class="app">

<div class="header">
<span class="back" onclick="history.back()">←</span>
Asset Scan Result
</div>

<div class="scan-box">
<div id="reader"></div>

<div class="scan-text">
Scan another QR code to continue.
</div>

</div>


<div class="card" id="assetCard">

<h3 id="assetName"></h3>

<p>ID: <span id="assetID"></span></p>

<div class="grid">

<div>
<b>Auditorium</b><br>
<span id="assetAuditorium"></span>
</div>

<div>
<b>Floor</b><br>
<span id="assetFloor"></span>
</div>

<div>
<b>Room</b><br>
<span id="assetRoom"></span>
</div>

<div>
<b>Type</b><br>
<span id="assetType"></span>
</div>

</div>

<a id="reportLink">
<button class="btn-red">⚠ Báo hỏng</button>
</a>

{% if session["role"] == "admin" or session["role"] == "manager" %}

<form action="/update_location" method="POST">

<input type="hidden" name="asset_id" id="assetIDinput">

<label>Tòa</label>
<input type="text" name="building" required>

<label>Tầng</label>
<input type="text" name="floor" required>

<label>Phòng</label>
<input type="text" name="room" required>

<button class="btn-green">
📍 Cập nhật vị trí
</button>

</form>

{% endif %}

</div>

</div>


<script>

const html5QrCode = new Html5Qrcode("reader")

let lastScan = null
let lastTime = 0


function cleanID(text){

let id=text.trim()

if(id.includes("/asset/")){
id=id.split("/asset/")[1]
}

return id.replace(/\r?\n|\r/g,"")

}


function onScanSuccess(decodedText){

let now = Date.now()

let id = cleanID(decodedText)

if(id === lastScan && now-lastTime < 400) return

lastScan = id
lastTime = now


fetch("/api/asset/"+encodeURIComponent(id))

.then(res=>res.json())

.then(data=>{

console.log(data)

if(data.status==="ok"){

let a=data.data

document.getElementById("assetCard").style.display="block"

document.getElementById("assetName").innerText=a.Type_asset || "-"
document.getElementById("assetID").innerText=a.ID_assets || "-"
document.getElementById("assetBuilding").innerText=a.Building || "-"
document.getElementById("assetFloor").innerText=a.Floor || "-"
document.getElementById("assetRoom").innerText=a.Room || "-"
document.getElementById("assetType").innerText=a.Type_asset || "-"

document.getElementById("assetIDinput").value=a.ID_assets

document.getElementById("reportLink").href="/report/"+a.ID_assets

navigator.vibrate(200)

}

})

.catch(err=>{

console.log("API error",err)

})

}


function startScanner(){

Html5Qrcode.getCameras().then(devices=>{

if(!devices.length){

alert("Không tìm thấy camera")

return

}

let cameraId = devices[devices.length-1].id


html5QrCode.start(

cameraId,

{
fps:15,
qrbox:{width:300,height:180},
aspectRatio:1.777,
disableFlip:false
},

onScanSuccess

)


setTimeout(()=>{

html5QrCode.applyVideoConstraints({

focusMode:"continuous"

}).catch(()=>{})

},1000)

})

}


window.onload=startScanner

</script>

</body>
</html>
<>
